<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory — Unit Navigator</title>
  <script>(function(){var t=localStorage.getItem('un_theme')||'dark';document.documentElement.dataset.theme=t;})()</script>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    /* ── Toolbar ─────────────────────────────────────────────────── */
    .toolbar {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--s1);
      flex-wrap: wrap;
    }
    .search-wrap {
      position: relative; flex: 1; min-width: 200px; max-width: 340px;
    }
    .search-wrap svg {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: var(--muted); pointer-events: none;
    }
    .search-input {
      background: var(--s2); border: 1px solid var(--border-md);
      border-radius: var(--r-sm); color: var(--text);
      font-family: inherit; font-size: 0.875rem;
      padding: 9px 14px 9px 38px; width: 100%;
    }
    .search-input:focus { outline: none; border-color: var(--blue); }
    .stage-tabs {
      display: flex; gap: 4px; flex-wrap: wrap;
    }
    .stage-tab {
      padding: 7px 14px; font-size: 0.8125rem; font-weight: 500;
      border-radius: var(--r-sm); cursor: pointer;
      background: none; border: 1px solid var(--border);
      color: var(--text-2); font-family: inherit;
      transition: all 0.15s;
    }
    .stage-tab:hover { background: var(--s2); color: var(--text); }
    .stage-tab.active {
      background: var(--blue-gl); border-color: var(--blue-border);
      color: var(--blue);
    }
    .view-toggle {
      display: flex; border: 1px solid var(--border-md); border-radius: var(--r-sm); overflow: hidden;
    }
    .view-btn {
      padding: 8px 12px; background: none; border: none; cursor: pointer;
      color: var(--muted); transition: all 0.15s;
    }
    .view-btn.active { background: var(--s3); color: var(--text); }
    .view-btn:hover { color: var(--text); }

    /* ── Summary bar ─────────────────────────────────────────────── */
    .summary-bar {
      display: flex; gap: 24px; padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      font-size: 0.8125rem; flex-wrap: wrap;
    }
    .summary-item { display: flex; flex-direction: column; gap: 2px; }
    .summary-label { color: var(--muted); }
    .summary-val { font-weight: 600; font-size: 0.9375rem; }
    .sold-report {
      display: none;
      grid-template-columns: 220px 1fr 1fr;
      gap: 16px;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--s1);
    }
    .sold-report.show { display: grid; }
    .sold-card {
      border: 1px solid var(--border);
      border-radius: var(--r);
      background: var(--bg);
      padding: 16px;
    }
    .sold-card h3 {
      font-size: 0.78rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 10px;
    }
    .sold-big { font-size: 2rem; font-weight: 800; }
    .sold-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 7px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.875rem;
    }
    .sold-row:last-child { border-bottom: 0; }

    /* ── Board (Kanban) ──────────────────────────────────────────── */
    .board {
      display: flex; gap: 0;
      overflow-x: auto;
      height: calc(100vh - 181px);
      padding: 20px;
      gap: 16px;
    }
    .board::-webkit-scrollbar { height: 6px; }
    .board::-webkit-scrollbar-track { background: transparent; }
    .board::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 3px; }

    .col {
      flex: 0 0 290px;
      display: flex; flex-direction: column;
      background: var(--s1);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      overflow: hidden;
    }
    .col-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }
    .col-title {
      font-size: 0.8125rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.05em; flex: 1;
    }
    .col-count {
      background: var(--s3); color: var(--text-2);
      font-size: 0.75rem; font-weight: 700;
      padding: 2px 8px; border-radius: 99px;
    }
    .col-body {
      flex: 1; overflow-y: auto; padding: 12px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .col-body.drag-over {
      outline: 2px dashed var(--blue);
      outline-offset: -6px;
      background: var(--blue-gl);
    }
    .col-body::-webkit-scrollbar { width: 4px; }
    .col-body::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 2px; }

    /* ── Unit card ───────────────────────────────────────────────── */
    .unit-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.15s;
    }
    .unit-card.dragging { opacity: 0.55; transform: scale(0.98); }
    .unit-card:hover { border-color: var(--border-hi); transform: translateY(-2px); }
    .unit-photo {
      width: 100%; height: 130px; object-fit: cover;
      background: var(--s2);
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 2rem;
    }
    .unit-photo img { width: 100%; height: 100%; object-fit: cover; }
    .unit-body { padding: 12px; }
    .unit-title {
      font-size: 0.9375rem; font-weight: 700; line-height: 1.3;
      margin-bottom: 3px;
    }
    .unit-sub {
      font-size: 0.75rem; color: var(--muted); margin-bottom: 10px;
    }
    .unit-row {
      display: flex; justify-content: space-between; align-items: baseline;
      font-size: 0.8125rem;
    }
    .unit-cost { color: var(--text-2); }
    .unit-price { font-weight: 600; }
    .unit-gross { font-size: 0.75rem; margin-top: 4px; }
    .unit-actions {
      display: flex; gap: 6px; margin-top: 10px;
      padding-top: 10px; border-top: 1px solid var(--border);
    }
    .unit-action {
      flex: 1; padding: 6px; font-size: 0.75rem; font-weight: 500;
      font-family: inherit; cursor: pointer;
      border-radius: var(--r-sm); border: 1px solid var(--border-md);
      background: var(--s2); color: var(--text-2);
      transition: all 0.15s;
    }
    .unit-action:hover { background: var(--s3); color: var(--text); }

    /* ── Grid view ───────────────────────────────────────────────── */
    .grid-view {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      padding: 20px 24px;
    }
    .grid-view .unit-card { cursor: pointer; }

    /* ── List view ───────────────────────────────────────────────── */
    .list-view { padding: 0 24px 24px; }
    .list-table { width: 100%; border-collapse: collapse; }
    .list-table th {
      text-align: left; font-size: 0.75rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.04em;
      color: var(--muted); padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }
    .list-table td {
      padding: 12px 16px; font-size: 0.875rem;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .list-table tr:hover td { background: var(--s1); cursor: pointer; }
    .list-unit-name { font-weight: 600; }
    .list-vin { color: var(--muted); font-size: 0.75rem; font-family: monospace; }

    /* column stage accent */
    .col[data-stage="acquired"]  { border-top: 2px solid var(--blue);   }
    .col[data-stage="transport"] { border-top: 2px solid var(--purple); }
    .col[data-stage="screening"] { border-top: 2px solid var(--yellow); }
    .col[data-stage="recon"]     { border-top: 2px solid var(--orange); }
    .col[data-stage="ready"]     { border-top: 2px solid var(--green);  }
    .col[data-stage="pending"]   { border-top: 2px solid var(--yellow); }
    .col[data-stage="sold"]      { border-top: 2px solid var(--c-sold); }

    @media(max-width:768px) {
      .board { flex-direction: column; height: auto; }
      .col { flex: 0 0 auto; }
      .sold-report { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div id="nav-container"></div>

<div class="toolbar">
  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input class="search-input" id="searchInput" placeholder="Search VIN, make, model…" oninput="renderUnits()">
  </div>

  <div class="stage-tabs" id="stageTabs">
    <button class="stage-tab active" data-stage="all" onclick="setStage('all',this)">All</button>
    <button class="stage-tab" data-stage="acquired"  onclick="setStage('acquired',this)">At Auction</button>
    <button class="stage-tab" data-stage="transport" onclick="setStage('transport',this)">Being Transported</button>
    <button class="stage-tab" data-stage="screening" onclick="setStage('screening',this)">Needs Screening</button>
    <button class="stage-tab" data-stage="recon"     onclick="setStage('recon',this)">Recon</button>
    <button class="stage-tab" data-stage="ready"     onclick="setStage('ready',this)">Ready</button>
    <button class="stage-tab" data-stage="pending"   onclick="setStage('pending',this)">Pending</button>
    <button class="stage-tab" data-stage="sold"      onclick="setStage('sold',this)">Sold</button>
    <button class="stage-tab" data-stage="archived"  onclick="setStage('archived',this)">Archived</button>
  </div>

  <div style="margin-left:auto;display:flex;gap:10px;align-items:center;">
    <select class="form-select" id="soldRange" onchange="renderSoldReport()" style="width:140px;">
      <option value="day">Sold: Day</option>
      <option value="week">Sold: Week</option>
      <option value="month" selected>Sold: Month</option>
      <option value="ytd">Sold: YTD</option>
    </select>
    <a href="/inventory/list" class="btn btn-ghost btn-sm">Inventory List</a>
    <div class="view-toggle">
      <button class="view-btn active" id="vBoard" onclick="setView('board')" title="Board">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="18" rx="1"/><rect x="14" y="3" width="7" height="10" rx="1"/><rect x="14" y="17" width="7" height="4" rx="1"/></svg>
      </button>
      <button class="view-btn" id="vGrid" onclick="setView('grid')" title="Grid">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      </button>
      <button class="view-btn" id="vList" onclick="setView('list')" title="List">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      </button>
    </div>
    <a href="/inventory/new" class="btn btn-primary btn-sm">+ Add Unit</a>
  </div>
</div>

<div class="summary-bar" id="summaryBar"></div>
<div class="sold-report" id="soldReport"></div>

<div id="mainContent"></div>

<script src="/js/nav.js"></script>
<script>
UN.requireAuth();
UN.renderNav();

const STAGES = ['acquired','transport','screening','recon','ready','pending','sold'];
const STAGE_LABELS = { acquired:'At Auction', transport:'Being Transported', screening:'Needs Screening', recon:'Recon', ready:'Ready', pending:'Pending', sold:'Sold', archived:'Archived' };

let allUnits = [];
let currentStage = 'all';
let currentView = location.pathname.endsWith('/list') ? 'list' : 'board';
let listSort = { key: 'created_at', dir: 'desc' };

function parseMoneyInput(value) {
  const parsed = Number(String(value ?? '').replace(/[^0-9.-]/g, ''));
  return Number.isFinite(parsed) ? parsed : 0;
}

function promptReconRepairs() {
  const items = [];
  let keepGoing = true;
  while (keepGoing) {
    const description = prompt(items.length ? 'Next repair needed?' : 'Repair needed?') || '';
    const costRaw = description ? (prompt('Estimated repair cost? Optional — leave blank if unknown.') || '') : '';
    const cost = parseMoneyInput(costRaw);
    if (description.trim() || cost) {
      items.push({ description: description.trim(), cost, status: 'searching' });
    }
    keepGoing = confirm('Is there anything else needed?');
  }
  return items;
}

async function load() {
  try {
    const data = await UN.api('GET', '/api/inventory');
    allUnits = data.units;
    renderSummary();
    renderSoldReport();
    if (currentView === 'list') {
      document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('vList').classList.add('active');
    }
    renderUnits();
  } catch(e) {
    toast(e.message, 'err');
  }
}

function soldUnitsForRange() {
  const range = document.getElementById('soldRange').value;
  const now = new Date();
  const start = new Date(now);
  if (range === 'day') start.setHours(0, 0, 0, 0);
  if (range === 'week') start.setDate(now.getDate() - 7);
  if (range === 'month') start.setMonth(now.getMonth() - 1);
  if (range === 'ytd') {
    start.setMonth(0, 1);
    start.setHours(0, 0, 0, 0);
  }
  return allUnits.filter(u => {
    if (u.stage !== 'sold') return false;
    if (!u.sold_at) return true;
    return new Date(u.sold_at) >= start;
  });
}

function renderSoldReport() {
  const el = document.getElementById('soldReport');
  const sold = soldUnitsForRange();
  const show = currentStage === 'sold' || currentStage === 'all';
  el.classList.toggle('show', show);
  if (!show) return;

  const byModel = new Map();
  sold.forEach(u => {
    const model = `${u.make || 'Unknown'} ${u.model || ''}`.trim();
    const current = byModel.get(model) || { count: 0, profit: 0 };
    current.count += 1;
    current.profit += Number(u.actual_gross || 0);
    byModel.set(model, current);
  });
  const modelsByCount = [...byModel.entries()].sort((a, b) => b[1].count - a[1].count);
  const modelsByProfit = [...byModel.entries()].sort((a, b) => b[1].profit - a[1].profit);

  el.innerHTML = `
    <div class="sold-card"><h3>Cars Sold</h3><div class="sold-big">${sold.length}</div><p class="text-muted text-sm mt-8">${document.getElementById('soldRange').selectedOptions[0].textContent.replace('Sold: ', '')}</p></div>
    <div class="sold-card"><h3>Models Sold</h3>${soldRows(modelsByCount, 'count')}</div>
    <div class="sold-card"><h3>Profit / Model</h3>${soldRows(modelsByProfit, 'profit')}</div>
  `;
}

function soldRows(rows, mode) {
  if (!rows.length) return '<p class="text-muted text-sm">No sold units in this range.</p>';
  return rows.slice(0, 6).map(([model, data]) => `
    <div class="sold-row"><span>${model}</span><strong>${mode === 'count' ? data.count : UN.fmt.money(data.profit)}</strong></div>
  `).join('');
}

function filteredUnits() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  return allUnits.filter(u => {
    const stageOk = currentStage === 'all' || u.stage === currentStage;
    const searchOk = !q || `${u.year} ${u.make} ${u.model} ${u.vin}`.toLowerCase().includes(q);
    return stageOk && searchOk;
  });
}

function renderSummary() {
  const active = allUnits.filter(u => !['sold','archived'].includes(u.stage));
  const totalCost = active.reduce((s, u) => s + (u.total_cost || 0), 0);
  const totalAsk  = active.reduce((s, u) => s + (u.asking_price || 0), 0);
  const estGross  = active.reduce((s, u) => s + (u.estimated_gross || 0), 0);

  document.getElementById('summaryBar').innerHTML = `
    <div class="summary-item"><span class="summary-label">Active Units</span><span class="summary-val">${active.length}</span></div>
    <div class="summary-item"><span class="summary-label">Total In Cost</span><span class="summary-val">${UN.fmt.money(totalCost)}</span></div>
    <div class="summary-item"><span class="summary-label">Total Asking</span><span class="summary-val">${UN.fmt.money(totalAsk)}</span></div>
    <div class="summary-item"><span class="summary-label">Est. Gross</span><span class="summary-val ${estGross >= 0 ? 'money-green' : 'money-red'}">${UN.fmt.money(estGross)}</span></div>
    <div class="summary-item"><span class="summary-label">Sold</span><span class="summary-val">${allUnits.filter(u=>u.stage==='sold').length}</span></div>
  `;
}

function renderUnits() {
  const units = filteredUnits();
  renderSoldReport();
  const el = document.getElementById('mainContent');
  if (currentView === 'board') renderBoard(units, el);
  else if (currentView === 'grid') renderGrid(units, el);
  else renderList(units, el);
}

function renderBoard(units, el) {
  const stagesToShow = currentStage === 'all' ? STAGES : [currentStage];
  const byStage = {};
  stagesToShow.forEach(s => byStage[s] = []);
  units.forEach(u => { if (byStage[u.stage]) byStage[u.stage].push(u); });

  el.innerHTML = '';
  const board = document.createElement('div');
  board.className = 'board';

  stagesToShow.forEach(stage => {
    const stageUnits = byStage[stage];
    const col = document.createElement('div');
    col.className = 'col'; col.dataset.stage = stage;
    col.innerHTML = `
      <div class="col-header">
        <span class="stage-dot dot-${stage}"></span>
        <span class="col-title">${STAGE_LABELS[stage]}</span>
        <span class="col-count">${stageUnits.length}</span>
      </div>
      <div class="col-body" id="col-${stage}" data-drop-stage="${stage}" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event, '${stage}')"></div>`;
    board.appendChild(col);

    const body = col.querySelector('.col-body');
    if (!stageUnits.length) {
      body.innerHTML = `<div style="text-align:center;padding:40px 0;color:var(--muted);font-size:0.8125rem;">No units</div>`;
    } else {
      stageUnits.forEach(u => body.appendChild(makeCard(u)));
    }
  });

  el.appendChild(board);
}

function renderGrid(units, el) {
  el.innerHTML = '';
  if (!units.length) { el.innerHTML = emptyState(); return; }
  const grid = document.createElement('div');
  grid.className = 'grid-view';
  units.forEach(u => grid.appendChild(makeCard(u)));
  el.appendChild(grid);
}

function renderList(units, el) {
  el.innerHTML = '';
  if (!units.length) { el.innerHTML = emptyState(); return; }
  const sorted = [...units].sort((a, b) => {
    const av = valueForSort(a, listSort.key);
    const bv = valueForSort(b, listSort.key);
    if (av < bv) return listSort.dir === 'asc' ? -1 : 1;
    if (av > bv) return listSort.dir === 'asc' ? 1 : -1;
    return 0;
  });
  el.innerHTML = `
    <div class="list-view">
      <table class="list-table">
        <thead>
          <tr>
            <th onclick="sortList('unit')">Unit</th><th onclick="sortList('vin')">VIN</th><th onclick="sortList('stage')">Stage</th><th onclick="sortList('mileage')">Mileage</th>
            <th onclick="sortList('total_cost')">In Cost</th><th onclick="sortList('asking_price')">Asking</th><th onclick="sortList('estimated_gross')">Est. Gross</th><th onclick="sortList('created_at')">Added</th><th></th>
          </tr>
        </thead>
        <tbody>
          ${sorted.map(u => `
            <tr onclick="location.href='/inventory/${u.id}'" style="cursor:pointer">
              <td>
                <div class="list-unit-name">${u.year} ${u.make} ${u.model}</div>
                <div class="list-vin">…${UN.fmt.vin(u.vin)}</div>
              </td>
              <td style="font-family:monospace;font-size:0.8125rem;color:var(--muted)">${u.vin}</td>
              <td>${UN.fmt.stageBadge(u.stage)}</td>
              <td>${UN.fmt.miles(u.mileage)}</td>
              <td class="money">${UN.fmt.money(u.total_cost)}</td>
              <td class="money">${UN.fmt.money(u.asking_price)}</td>
              <td class="money">${UN.fmt.gross(u.estimated_gross)}</td>
              <td style="color:var(--muted);font-size:0.8125rem">${UN.fmt.date(u.created_at)}</td>
              <td><button class="unit-action" onclick="deleteUnit(event, ${u.id})">Delete</button></td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

function valueForSort(u, key) {
  if (key === 'unit') return `${u.year || ''} ${u.make || ''} ${u.model || ''}`.toLowerCase();
  if (key === 'vin') return (u.vin || '').toLowerCase();
  if (key === 'stage') return STAGE_LABELS[u.stage] || u.stage || '';
  return u[key] || 0;
}

function sortList(key) {
  if (listSort.key === key) listSort.dir = listSort.dir === 'asc' ? 'desc' : 'asc';
  else listSort = { key, dir: key === 'unit' || key === 'vin' || key === 'stage' ? 'asc' : 'desc' };
  renderUnits();
}

function makeCard(u) {
  const div = document.createElement('div');
  div.className = 'unit-card';
  div.draggable = true;
  div.dataset.unitId = u.id;
  div.dataset.stage = u.stage;
  div.addEventListener('dragstart', onDragStart);
  div.addEventListener('dragend', onDragEnd);
  div.onclick = () => location.href = `/inventory/${u.id}`;
  const photo = u.photos?.[0];
  div.innerHTML = `
    <div class="unit-photo">
      ${photo ? `<img src="${photo}" alt="${u.year} ${u.make} ${u.model}" loading="lazy">` : '🚗'}
    </div>
    <div class="unit-body">
      <div class="unit-title">${u.year || ''} ${u.make || ''} ${u.model || ''}</div>
      <div class="unit-sub">…${UN.fmt.vin(u.vin)} &bull; ${UN.fmt.miles(u.mileage)}</div>
      <div class="unit-row">
        <span class="unit-cost">In: ${UN.fmt.money(u.total_cost)}</span>
        <span class="unit-price">${UN.fmt.money(u.asking_price)}</span>
      </div>
      <div class="unit-gross">${UN.fmt.gross(u.estimated_gross)}</div>
      <div class="unit-actions" onclick="event.stopPropagation()">
        <button class="unit-action" onclick="location.href='/inventory/${u.id}'">Open</button>
        <button class="unit-action" onclick="quickStage(event, ${u.id}, '${u.stage}')">Move Stage</button>
        <button class="unit-action" onclick="deleteUnit(event, ${u.id})">Delete</button>
      </div>
    </div>`;
  return div;
}

function onDragStart(e) {
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', e.currentTarget.dataset.unitId);
}

function onDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.col-body.drag-over').forEach(el => el.classList.remove('drag-over'));
}

function onDragOver(e) {
  e.preventDefault();
  e.currentTarget.classList.add('drag-over');
  e.dataTransfer.dropEffect = 'move';
}

function onDragLeave(e) {
  if (!e.currentTarget.contains(e.relatedTarget)) e.currentTarget.classList.remove('drag-over');
}

async function onDrop(e, stage) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  const id = Number(e.dataTransfer.getData('text/plain'));
  const unit = allUnits.find(u => u.id === id);
  if (!unit || unit.stage === stage) return;
  await moveUnitToStage(id, stage);
}

function emptyState() {
  return `<div class="empty-state">
    <div class="empty-icon">🚗</div>
    <h3>No units found</h3>
    <p>Add your first unit to get started.</p>
    <a href="/inventory/new" class="btn btn-primary" style="margin-top:16px">+ Add Unit</a>
  </div>`;
}

function setStage(stage, btn) {
  currentStage = stage;
  document.querySelectorAll('.stage-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  if (stage === 'sold') document.getElementById('soldRange').focus();
  renderUnits();
}

function setView(view) {
  currentView = view;
  ['board','grid','list'].forEach(v => document.getElementById(`v${v.charAt(0).toUpperCase()+v.slice(1)}`).classList.remove('active'));
  document.getElementById(`v${view.charAt(0).toUpperCase()+view.slice(1)}`).classList.add('active');
  renderUnits();
}

async function quickStage(e, id, current) {
  e.stopPropagation();
  const stages = ['acquired','transport','screening','recon','ready','pending','sold','archived'];
  const idx = stages.indexOf(current);
  const next = stages[(idx + 1) % stages.length];
  if (!confirm(`Move to "${STAGE_LABELS[next]}"?`)) return;
  await moveUnitToStage(id, next);
}

async function moveUnitToStage(id, next) {
  try {
    if (next === 'transport') {
      const costRaw = prompt('Transport cost? Optional — leave blank if unknown.') || '';
      const cost = parseMoneyInput(costRaw);
      if (cost) await UN.api('PUT', `/api/inventory/${id}`, { transport_cost: cost });
    }
    if (next === 'recon') {
      const unit = allUnits.find(u => u.id === id);
      const newRepairs = promptReconRepairs();
      if (newRepairs.length) {
        const repairItems = Array.isArray(unit?.repair_items) ? unit.repair_items : [];
        await UN.api('PUT', `/api/inventory/${id}`, {
          repair_items: [...repairItems, ...newRepairs],
        });
      }
    }
    if (next === 'sold') {
      const unit = allUnits.find(u => u.id === id);
      const saleType = prompt('Sale type? Retail, wholesale, trade, or other. Optional.') || '';
      const priceRaw = prompt('Sold/trade value? Optional — leave blank if unknown.') || '';
      const price = priceRaw.trim() ? Number(priceRaw) || 0 : 0;
      const updates = {};
      if (price) updates.sold_price = price;
      if (saleType) updates.notes = [unit?.notes || '', `Sold type: ${saleType}`].filter(Boolean).join('\n');
      if (Object.keys(updates).length) await UN.api('PUT', `/api/inventory/${id}`, updates);
    }
    await UN.api('PATCH', `/api/inventory/${id}/stage`, { stage: next });
    toast(`Moved to ${STAGE_LABELS[next]}`);
    await load();
  } catch(e) { toast(e.message, 'err'); }
}

async function deleteUnit(e, id) {
  e.stopPropagation();
  const unit = allUnits.find(u => u.id === id);
  const label = unit ? `${unit.year || ''} ${unit.make || ''} ${unit.model || ''}`.trim() : 'this unit';
  if (!confirm(`Delete ${label}? This permanently removes it from inventory.`)) return;
  try {
    await UN.api('DELETE', `/api/inventory/${id}`);
    toast('Unit deleted');
    await load();
  } catch(e) { toast(e.message, 'err'); }
}

load();
</script>
</body>
</html>
