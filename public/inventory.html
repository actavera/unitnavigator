<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory — Unit Navigator</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    /* ── Toolbar ─────────────────────────────────────────────────── */
    .toolbar {
      display: flex; align-items: center; gap: 12px;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--s1);
      flex-wrap: wrap;
    }
    .search-wrap {
      position: relative; flex: 1; min-width: 200px; max-width: 340px;
    }
    .search-wrap svg {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: var(--muted); pointer-events: none;
    }
    .search-input {
      background: var(--s2); border: 1px solid var(--border-md);
      border-radius: var(--r-sm); color: var(--text);
      font-family: inherit; font-size: 0.875rem;
      padding: 9px 14px 9px 38px; width: 100%;
    }
    .search-input:focus { outline: none; border-color: var(--blue); }
    .stage-tabs {
      display: flex; gap: 4px; flex-wrap: wrap;
    }
    .stage-tab {
      padding: 7px 14px; font-size: 0.8125rem; font-weight: 500;
      border-radius: var(--r-sm); cursor: pointer;
      background: none; border: 1px solid var(--border);
      color: var(--text-2); font-family: inherit;
      transition: all 0.15s;
    }
    .stage-tab:hover { background: var(--s2); color: var(--text); }
    .stage-tab.active {
      background: var(--blue-gl); border-color: var(--blue-border);
      color: var(--blue);
    }
    .view-toggle {
      display: flex; border: 1px solid var(--border-md); border-radius: var(--r-sm); overflow: hidden;
    }
    .view-btn {
      padding: 8px 12px; background: none; border: none; cursor: pointer;
      color: var(--muted); transition: all 0.15s;
    }
    .view-btn.active { background: var(--s3); color: var(--text); }
    .view-btn:hover { color: var(--text); }

    /* ── Summary bar ─────────────────────────────────────────────── */
    .summary-bar {
      display: flex; gap: 24px; padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      font-size: 0.8125rem; flex-wrap: wrap;
    }
    .summary-item { display: flex; flex-direction: column; gap: 2px; }
    .summary-label { color: var(--muted); }
    .summary-val { font-weight: 600; font-size: 0.9375rem; }

    /* ── Board (Kanban) ──────────────────────────────────────────── */
    .board {
      display: flex; gap: 0;
      overflow-x: auto;
      height: calc(100vh - 181px);
      padding: 20px;
      gap: 16px;
    }
    .board::-webkit-scrollbar { height: 6px; }
    .board::-webkit-scrollbar-track { background: transparent; }
    .board::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 3px; }

    .col {
      flex: 0 0 290px;
      display: flex; flex-direction: column;
      background: var(--s1);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      overflow: hidden;
    }
    .col-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }
    .col-title {
      font-size: 0.8125rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.05em; flex: 1;
    }
    .col-count {
      background: var(--s3); color: var(--text-2);
      font-size: 0.75rem; font-weight: 700;
      padding: 2px 8px; border-radius: 99px;
    }
    .col-body {
      flex: 1; overflow-y: auto; padding: 12px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .col-body::-webkit-scrollbar { width: 4px; }
    .col-body::-webkit-scrollbar-thumb { background: var(--border-md); border-radius: 2px; }

    /* ── Unit card ───────────────────────────────────────────────── */
    .unit-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.15s;
    }
    .unit-card:hover { border-color: var(--border-hi); transform: translateY(-2px); }
    .unit-photo {
      width: 100%; height: 130px; object-fit: cover;
      background: var(--s2);
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 2rem;
    }
    .unit-photo img { width: 100%; height: 100%; object-fit: cover; }
    .unit-body { padding: 12px; }
    .unit-title {
      font-size: 0.9375rem; font-weight: 700; line-height: 1.3;
      margin-bottom: 3px;
    }
    .unit-sub {
      font-size: 0.75rem; color: var(--muted); margin-bottom: 10px;
    }
    .unit-row {
      display: flex; justify-content: space-between; align-items: baseline;
      font-size: 0.8125rem;
    }
    .unit-cost { color: var(--text-2); }
    .unit-price { font-weight: 600; }
    .unit-gross { font-size: 0.75rem; margin-top: 4px; }
    .unit-actions {
      display: flex; gap: 6px; margin-top: 10px;
      padding-top: 10px; border-top: 1px solid var(--border);
    }
    .unit-action {
      flex: 1; padding: 6px; font-size: 0.75rem; font-weight: 500;
      font-family: inherit; cursor: pointer;
      border-radius: var(--r-sm); border: 1px solid var(--border-md);
      background: var(--s2); color: var(--text-2);
      transition: all 0.15s;
    }
    .unit-action:hover { background: var(--s3); color: var(--text); }

    /* ── Grid view ───────────────────────────────────────────────── */
    .grid-view {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      padding: 20px 24px;
    }
    .grid-view .unit-card { cursor: pointer; }

    /* ── List view ───────────────────────────────────────────────── */
    .list-view { padding: 0 24px 24px; }
    .list-table { width: 100%; border-collapse: collapse; }
    .list-table th {
      text-align: left; font-size: 0.75rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.04em;
      color: var(--muted); padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }
    .list-table td {
      padding: 12px 16px; font-size: 0.875rem;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .list-table tr:hover td { background: var(--s1); cursor: pointer; }
    .list-unit-name { font-weight: 600; }
    .list-vin { color: var(--muted); font-size: 0.75rem; font-family: monospace; }

    /* column stage accent */
    .col[data-stage="acquired"]  { border-top: 2px solid var(--blue);   }
    .col[data-stage="transport"] { border-top: 2px solid var(--purple); }
    .col[data-stage="recon"]     { border-top: 2px solid var(--orange); }
    .col[data-stage="ready"]     { border-top: 2px solid var(--green);  }
    .col[data-stage="pending"]   { border-top: 2px solid var(--yellow); }
    .col[data-stage="sold"]      { border-top: 2px solid var(--c-sold); }

    @media(max-width:768px) {
      .board { flex-direction: column; height: auto; }
      .col { flex: 0 0 auto; }
    }
  </style>
</head>
<body>
<div id="nav-container"></div>

<div class="toolbar">
  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input class="search-input" id="searchInput" placeholder="Search VIN, make, model…" oninput="renderUnits()">
  </div>

  <div class="stage-tabs" id="stageTabs">
    <button class="stage-tab active" data-stage="all" onclick="setStage('all',this)">All</button>
    <button class="stage-tab" data-stage="acquired"  onclick="setStage('acquired',this)">Acquired</button>
    <button class="stage-tab" data-stage="transport" onclick="setStage('transport',this)">Transport</button>
    <button class="stage-tab" data-stage="recon"     onclick="setStage('recon',this)">Recon</button>
    <button class="stage-tab" data-stage="ready"     onclick="setStage('ready',this)">Ready</button>
    <button class="stage-tab" data-stage="pending"   onclick="setStage('pending',this)">Pending</button>
    <button class="stage-tab" data-stage="sold"      onclick="setStage('sold',this)">Sold</button>
    <button class="stage-tab" data-stage="archived"  onclick="setStage('archived',this)">Archived</button>
  </div>

  <div style="margin-left:auto;display:flex;gap:10px;align-items:center;">
    <div class="view-toggle">
      <button class="view-btn active" id="vBoard" onclick="setView('board')" title="Board">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="18" rx="1"/><rect x="14" y="3" width="7" height="10" rx="1"/><rect x="14" y="17" width="7" height="4" rx="1"/></svg>
      </button>
      <button class="view-btn" id="vGrid" onclick="setView('grid')" title="Grid">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      </button>
      <button class="view-btn" id="vList" onclick="setView('list')" title="List">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      </button>
    </div>
    <a href="/inventory/new" class="btn btn-primary btn-sm">+ Add Unit</a>
  </div>
</div>

<div class="summary-bar" id="summaryBar"></div>

<div id="mainContent"></div>

<script src="/js/nav.js"></script>
<script>
UN.requireAuth();
UN.renderNav();

const STAGES = ['acquired','transport','recon','ready','pending','sold'];
const STAGE_LABELS = { acquired:'Acquired', transport:'Transport', recon:'Recon', ready:'Ready', pending:'Pending Deal', sold:'Sold', archived:'Archived' };

let allUnits = [];
let currentStage = 'all';
let currentView = 'board';

async function load() {
  try {
    const data = await UN.api('GET', '/api/inventory');
    allUnits = data.units;
    renderSummary();
    renderUnits();
  } catch(e) {
    toast(e.message, 'err');
  }
}

function filteredUnits() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  return allUnits.filter(u => {
    const stageOk = currentStage === 'all' || u.stage === currentStage;
    const searchOk = !q || `${u.year} ${u.make} ${u.model} ${u.vin}`.toLowerCase().includes(q);
    return stageOk && searchOk;
  });
}

function renderSummary() {
  const active = allUnits.filter(u => !['sold','archived'].includes(u.stage));
  const totalCost = active.reduce((s, u) => s + (u.total_cost || 0), 0);
  const totalAsk  = active.reduce((s, u) => s + (u.asking_price || 0), 0);
  const estGross  = active.reduce((s, u) => s + (u.estimated_gross || 0), 0);

  document.getElementById('summaryBar').innerHTML = `
    <div class="summary-item"><span class="summary-label">Active Units</span><span class="summary-val">${active.length}</span></div>
    <div class="summary-item"><span class="summary-label">Total In Cost</span><span class="summary-val">${UN.fmt.money(totalCost)}</span></div>
    <div class="summary-item"><span class="summary-label">Total Asking</span><span class="summary-val">${UN.fmt.money(totalAsk)}</span></div>
    <div class="summary-item"><span class="summary-label">Est. Gross</span><span class="summary-val ${estGross >= 0 ? 'money-green' : 'money-red'}">${UN.fmt.money(estGross)}</span></div>
    <div class="summary-item"><span class="summary-label">Sold</span><span class="summary-val">${allUnits.filter(u=>u.stage==='sold').length}</span></div>
  `;
}

function renderUnits() {
  const units = filteredUnits();
  const el = document.getElementById('mainContent');
  if (currentView === 'board') renderBoard(units, el);
  else if (currentView === 'grid') renderGrid(units, el);
  else renderList(units, el);
}

function renderBoard(units, el) {
  const stagesToShow = currentStage === 'all' ? STAGES : [currentStage];
  const byStage = {};
  stagesToShow.forEach(s => byStage[s] = []);
  units.forEach(u => { if (byStage[u.stage]) byStage[u.stage].push(u); });

  el.innerHTML = '';
  const board = document.createElement('div');
  board.className = 'board';

  stagesToShow.forEach(stage => {
    const stageUnits = byStage[stage];
    const col = document.createElement('div');
    col.className = 'col'; col.dataset.stage = stage;
    col.innerHTML = `
      <div class="col-header">
        <span class="stage-dot dot-${stage}"></span>
        <span class="col-title">${STAGE_LABELS[stage]}</span>
        <span class="col-count">${stageUnits.length}</span>
      </div>
      <div class="col-body" id="col-${stage}"></div>`;
    board.appendChild(col);

    const body = col.querySelector('.col-body');
    if (!stageUnits.length) {
      body.innerHTML = `<div style="text-align:center;padding:40px 0;color:var(--muted);font-size:0.8125rem;">No units</div>`;
    } else {
      stageUnits.forEach(u => body.appendChild(makeCard(u)));
    }
  });

  el.appendChild(board);
}

function renderGrid(units, el) {
  el.innerHTML = '';
  if (!units.length) { el.innerHTML = emptyState(); return; }
  const grid = document.createElement('div');
  grid.className = 'grid-view';
  units.forEach(u => grid.appendChild(makeCard(u)));
  el.appendChild(grid);
}

function renderList(units, el) {
  el.innerHTML = '';
  if (!units.length) { el.innerHTML = emptyState(); return; }
  el.innerHTML = `
    <div class="list-view">
      <table class="list-table">
        <thead>
          <tr>
            <th>Unit</th><th>VIN</th><th>Stage</th><th>Mileage</th>
            <th>In Cost</th><th>Asking</th><th>Est. Gross</th><th>Added</th>
          </tr>
        </thead>
        <tbody>
          ${units.map(u => `
            <tr onclick="location.href='/inventory/${u.id}'" style="cursor:pointer">
              <td>
                <div class="list-unit-name">${u.year} ${u.make} ${u.model}</div>
                <div class="list-vin">…${UN.fmt.vin(u.vin)}</div>
              </td>
              <td style="font-family:monospace;font-size:0.8125rem;color:var(--muted)">${u.vin}</td>
              <td>${UN.fmt.stageBadge(u.stage)}</td>
              <td>${UN.fmt.miles(u.mileage)}</td>
              <td class="money">${UN.fmt.money(u.total_cost)}</td>
              <td class="money">${UN.fmt.money(u.asking_price)}</td>
              <td class="money">${UN.fmt.gross(u.estimated_gross)}</td>
              <td style="color:var(--muted);font-size:0.8125rem">${UN.fmt.date(u.created_at)}</td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

function makeCard(u) {
  const div = document.createElement('div');
  div.className = 'unit-card';
  div.onclick = () => location.href = `/inventory/${u.id}`;
  const photo = u.photos?.[0];
  div.innerHTML = `
    <div class="unit-photo">
      ${photo ? `<img src="${photo}" alt="${u.year} ${u.make} ${u.model}" loading="lazy">` : '🚗'}
    </div>
    <div class="unit-body">
      <div class="unit-title">${u.year || ''} ${u.make || ''} ${u.model || ''}</div>
      <div class="unit-sub">…${UN.fmt.vin(u.vin)} &bull; ${UN.fmt.miles(u.mileage)}</div>
      <div class="unit-row">
        <span class="unit-cost">In: ${UN.fmt.money(u.total_cost)}</span>
        <span class="unit-price">${UN.fmt.money(u.asking_price)}</span>
      </div>
      <div class="unit-gross">${UN.fmt.gross(u.estimated_gross)}</div>
      <div class="unit-actions" onclick="event.stopPropagation()">
        <button class="unit-action" onclick="location.href='/inventory/${u.id}'">Open</button>
        <button class="unit-action" onclick="quickStage(event, ${u.id}, '${u.stage}')">Move Stage</button>
      </div>
    </div>`;
  return div;
}

function emptyState() {
  return `<div class="empty-state">
    <div class="empty-icon">🚗</div>
    <h3>No units found</h3>
    <p>Add your first unit to get started.</p>
    <a href="/inventory/new" class="btn btn-primary" style="margin-top:16px">+ Add Unit</a>
  </div>`;
}

function setStage(stage, btn) {
  currentStage = stage;
  document.querySelectorAll('.stage-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderUnits();
}

function setView(view) {
  currentView = view;
  ['board','grid','list'].forEach(v => document.getElementById(`v${v.charAt(0).toUpperCase()+v.slice(1)}`).classList.remove('active'));
  document.getElementById(`v${view.charAt(0).toUpperCase()+view.slice(1)}`).classList.add('active');
  renderUnits();
}

async function quickStage(e, id, current) {
  e.stopPropagation();
  const stages = ['acquired','transport','recon','ready','pending','sold','archived'];
  const idx = stages.indexOf(current);
  const next = stages[(idx + 1) % stages.length];
  if (!confirm(`Move to "${STAGE_LABELS[next]}"?`)) return;
  try {
    await UN.api('PATCH', `/api/inventory/${id}/stage`, { stage: next });
    toast(`Moved to ${STAGE_LABELS[next]}`);
    await load();
  } catch(e) { toast(e.message, 'err'); }
}

load();
</script>
</body>
</html>
