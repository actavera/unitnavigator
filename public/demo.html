<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Starting Demo — Unit Navigator</title>
  <script>(function(){var t=localStorage.getItem('un_theme')||'dark';document.documentElement.dataset.theme=t;})()</script>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    body {
      display: grid;
      min-height: 100vh;
      place-items: center;
      background:
        linear-gradient(90deg, rgba(5,8,13,0.96) 0%, rgba(5,8,13,0.7) 48%, rgba(5,8,13,0.18) 100%),
        linear-gradient(180deg, rgba(5,8,13,0.03) 0%, rgba(5,8,13,0.86) 100%),
        url('/assets/home-hero-car.png') right top / cover no-repeat;
      padding: 22px;
    }
    :root[data-theme="light"] body {
      background:
        linear-gradient(90deg, rgba(246,249,253,0.97) 0%, rgba(246,249,253,0.78) 50%, rgba(246,249,253,0.28) 100%),
        linear-gradient(180deg, rgba(246,249,253,0.05) 0%, rgba(246,249,253,0.88) 100%),
        url('/assets/home-hero-car.png') right top / cover no-repeat;
    }
    .demo-launch {
      width: min(100%, 560px);
      border: 1px solid var(--border);
      border-radius: 22px;
      background: rgba(10,16,24,0.78);
      box-shadow: 0 28px 90px rgba(0,0,0,0.35);
      padding: 34px;
      text-align: center;
      backdrop-filter: blur(16px);
    }
    :root[data-theme="light"] .demo-launch {
      background: rgba(255,255,255,0.86);
      box-shadow: 0 28px 90px rgba(15,23,42,0.12);
    }
    .demo-launch img { width: 230px; max-width: 80%; margin-bottom: 26px; }
    .demo-launch h1 {
      font-size: clamp(2.1rem, 6vw, 3.5rem);
      line-height: 1;
      letter-spacing: -0.05em;
      margin-bottom: 12px;
    }
    .demo-launch p { color: var(--text-2); line-height: 1.55; margin-bottom: 22px; }
    .demo-spinner {
      width: 42px;
      height: 42px;
      border: 4px solid var(--border-md);
      border-top-color: var(--blue);
      border-radius: 999px;
      margin: 0 auto 18px;
      animation: spin 0.8s linear infinite;
    }
    .demo-error {
      display: none;
      border: 1px solid var(--red-border);
      border-radius: var(--r);
      background: var(--red-gl);
      color: var(--red);
      margin-top: 18px;
      padding: 12px;
      text-align: left;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <main class="demo-launch">
    <img data-theme-logo src="/assets/unit-navigator-logo-on-dark.png" alt="Unit Navigator">
    <div class="demo-spinner" aria-hidden="true"></div>
    <h1>Starting a real demo workspace.</h1>
    <p>This creates a temporary dealership login, then takes you into the actual Unit Navigator backend. Anything added in demo mode is deleted when you exit.</p>
    <button class="btn btn-primary" id="retryBtn" type="button" onclick="startDemo()" style="display:none;">Try Again</button>
    <div class="demo-error" id="demoError"></div>
  </main>

  <script src="/js/nav.js"></script>
  <script>
    UN.syncThemeToggle();

    async function startDemo() {
      document.getElementById('retryBtn').style.display = 'none';
      document.getElementById('demoError').style.display = 'none';
      try {
        if (UN.isDemo()) await UN.clearDemoData();
        UN.clearToken();
        const data = await UN.api('POST', '/api/auth/demo-login', {});
        UN.setToken(data.token);
        UN.setUser(data.user);
        location.replace('/home');
      } catch (err) {
        document.getElementById('demoError').textContent = err.message || 'Demo could not start.';
        document.getElementById('demoError').style.display = 'block';
        document.getElementById('retryBtn').style.display = 'inline-flex';
      }
    }

    startDemo();
  </script>
</body>
</html>
