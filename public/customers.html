<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clients - Unit Navigator</title>
  <script>(function(){var t=localStorage.getItem('un_theme')||'dark';document.documentElement.dataset.theme=t;})()</script>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    .client-shell { width: min(100% - 44px, 1440px); margin: 0 auto; padding: 30px 0 64px; }
    .client-hero {
      position: relative; display: grid; grid-template-columns: minmax(0,1fr) auto; gap: 18px; align-items: end;
      margin-bottom: 22px; overflow: hidden; border: 1px solid var(--border); border-radius: 26px; padding: 28px;
      background:
        radial-gradient(circle at 74% 18%, rgba(234,179,8,.26), transparent 28%),
        radial-gradient(circle at 96% 88%, rgba(59,130,246,.16), transparent 31%),
        linear-gradient(135deg, color-mix(in srgb, var(--s1), transparent 6%), color-mix(in srgb, var(--s2), transparent 18%));
      box-shadow: var(--sh);
    }
    .client-hero::after {
      content: ""; position: absolute; right: 54px; bottom: -74px; width: 300px; height: 190px; border-radius: 999px;
      border: 1px solid color-mix(in srgb, var(--yellow), transparent 62%);
      background: color-mix(in srgb, var(--yellow), transparent 88%);
      transform: rotate(-12deg); pointer-events: none;
    }
    .client-hero > * { position: relative; z-index: 1; }
    .client-hero h1 { font-size: clamp(2.25rem, 5vw, 4.8rem); line-height: .95; letter-spacing: -.055em; margin: 8px 0 12px; }
    .client-hero p { color: var(--text-2); max-width: 820px; line-height: 1.55; }
    .client-search-panel {
      border: 1px solid var(--border); border-radius: var(--r-lg);
      background:
        radial-gradient(circle at 96% 8%, rgba(59,130,246,.14), transparent 26%),
        var(--s1);
      box-shadow: var(--sh); padding: 18px; margin-bottom: 18px;
    }
    .client-search-row { display: grid; grid-template-columns: minmax(280px, 1fr) 180px 180px 180px auto; gap: 12px; align-items: end; }
    .client-search-input { font-size: 1.05rem; padding: 14px 16px; }
    .client-stats { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; margin-bottom: 18px; }
    .client-stat {
      display: grid; grid-template-columns: 48px minmax(0,1fr); gap: 12px; align-items: center;
      border: 1px solid var(--border); border-radius: var(--r); background: var(--s1); padding: 16px;
    }
    .client-stat-icon {
      display: grid; place-items: center; width: 48px; height: 48px; border-radius: 16px;
      background: var(--blue-gl); color: var(--blue); font-weight: 900;
    }
    .client-stat:nth-child(2) .client-stat-icon { background: var(--green-gl); color: var(--green); }
    .client-stat:nth-child(3) .client-stat-icon { background: var(--yellow-gl); color: var(--yellow); }
    .client-stat:nth-child(4) .client-stat-icon { background: var(--purple-gl); color: var(--purple); }
    .client-stat span { display: block; color: var(--muted); font-size: .75rem; text-transform: uppercase; letter-spacing: .05em; }
    .client-stat strong { display: block; font-size: 1.55rem; margin-top: 4px; letter-spacing: -.035em; }
    .client-layout { display: grid; grid-template-columns: minmax(0, 1fr) 420px; gap: 18px; align-items: start; }
    .client-results { border: 1px solid var(--border); border-radius: var(--r-lg); background: var(--s1); overflow: hidden; }
    .client-row { display: grid; grid-template-columns: 54px minmax(220px, 1.1fr) minmax(180px, .9fr) minmax(180px, .9fr) 130px; gap: 14px; align-items: center; padding: 16px 18px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .16s, transform .16s, box-shadow .16s; }
    .client-row:last-child { border-bottom: 0; }
    .client-row:hover, .client-row.active {
      background:
        radial-gradient(circle at 96% 18%, rgba(59,130,246,.12), transparent 26%),
        var(--s2);
    }
    .client-row:hover { transform: translateX(2px); box-shadow: inset 3px 0 0 var(--blue); }
    .client-avatar {
      display: grid; place-items: center; width: 54px; height: 54px; border-radius: 18px;
      background: linear-gradient(135deg, var(--blue-gl), var(--yellow-gl));
      color: var(--blue); border: 1px solid var(--blue-border); font-weight: 900;
    }
    .client-name { color: var(--text); font-weight: 900; font-size: 1.05rem; letter-spacing: -.02em; }
    .client-sub { color: var(--muted); font-size: .82rem; margin-top: 4px; line-height: 1.45; }
    .client-meta strong { display: block; color: var(--text); font-size: .92rem; }
    .client-meta span { display: block; color: var(--muted); font-size: .8rem; margin-top: 4px; }
    .client-detail { border: 1px solid var(--border); border-radius: var(--r-lg); background: var(--s1); box-shadow: var(--sh); overflow: hidden; position: sticky; top: 84px; }
    .client-detail-head {
      padding: 18px; border-bottom: 1px solid var(--border);
      background:
        radial-gradient(circle at 90% 0%, rgba(234,179,8,.16), transparent 34%),
        var(--s2);
    }
    .detail-identity { display: grid; grid-template-columns: 64px minmax(0,1fr); gap: 14px; align-items: center; }
    .detail-avatar {
      display: grid; place-items: center; width: 64px; height: 64px; border-radius: 22px;
      background: linear-gradient(135deg, var(--blue-gl), var(--yellow-gl));
      border: 1px solid var(--blue-border); color: var(--blue); font-size: 1.15rem; font-weight: 900;
    }
    .client-detail-head h2 { font-size: 1.35rem; letter-spacing: -.03em; }
    .client-detail-body { padding: 18px; display: grid; gap: 16px; }
    .detail-block { border: 1px solid var(--border); border-radius: var(--r); background: var(--s2); padding: 14px; }
    .detail-block h3 { font-size: .8rem; text-transform: uppercase; letter-spacing: .055em; color: var(--text-2); margin-bottom: 10px; }
    .detail-line { display: flex; justify-content: space-between; gap: 12px; padding: 7px 0; border-bottom: 1px solid var(--border); }
    .detail-line:last-child { border-bottom: 0; }
    .detail-line span { color: var(--muted); }
    .detail-line strong { text-align: right; color: var(--text); }
    .history-item { padding: 10px 0; border-bottom: 1px solid var(--border); }
    .history-item:last-child { border-bottom: 0; }
    .history-item strong { display: block; }
    .history-item span { color: var(--muted); font-size: .82rem; display: block; margin-top: 3px; }
    .client-empty { padding: 60px 22px; text-align: center; color: var(--muted); }
    mark { background: var(--yellow-gl); color: var(--text); border-radius: 4px; padding: 0 2px; }
    @media(max-width: 1120px) {
      .client-search-row { grid-template-columns: 1fr 1fr; }
      .client-layout { grid-template-columns: 1fr; }
      .client-detail { position: static; }
    }
    @media(max-width: 760px) {
      .client-shell { width: min(100% - 28px, 560px); }
      .client-hero, .client-search-row, .client-stats, .client-row { grid-template-columns: 1fr; }
      .client-row { gap: 8px; }
    }
  </style>
</head>
<body>
<div id="nav-container"></div>
<main class="client-shell">
  <header class="client-hero">
    <div>
      <p class="home-kicker">Client Search</p>
      <h1>Find past clients fast.</h1>
      <p>Search by name, phone, email, ID number, vehicle, VIN, employer, or credit notes. This is where old credit pulls and dead deals stay useful instead of disappearing.</p>
    </div>
    <a class="btn btn-primary" href="/credit/new">New Credit Pull</a>
  </header>

  <section class="client-search-panel">
    <div class="client-search-row">
      <div class="form-group">
        <label class="form-label">Search clients</label>
        <input class="form-input client-search-input" id="q" placeholder="Name, phone, email, VIN, vehicle, employer..." autocomplete="off">
      </div>
      <div class="form-group">
        <label class="form-label">Credit</label>
        <select class="form-select" id="creditFilter">
          <option value="all">Any credit</option>
          <option value="Approved">Approved</option>
          <option value="Review">Review</option>
          <option value="Declined">Declined</option>
          <option value="Pending">Pending</option>
          <option value="none">No credit pull</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Deals</label>
        <select class="form-select" id="dealFilter">
          <option value="all">Any deal</option>
          <option value="pending">Pending</option>
          <option value="closed">Closed</option>
          <option value="dead">Dead</option>
          <option value="vehicle_changed">Changed Vehicle</option>
          <option value="none">No deal</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Sort</label>
        <select class="form-select" id="sort">
          <option value="recent">Most recent</option>
          <option value="name">Name</option>
          <option value="credit">Last credit pull</option>
          <option value="deal">Last deal</option>
        </select>
      </div>
      <button class="btn btn-primary" onclick="loadClients()">Search</button>
    </div>
  </section>

  <section class="client-stats" id="clientStats"></section>

  <section class="client-layout">
    <div class="client-results" id="clientResults"></div>
    <aside class="client-detail" id="clientDetail"></aside>
  </section>
</main>

<script src="/js/nav.js"></script>
<script>
if (UN.requireAuth()) UN.renderNav();

let clients = [];
let selectedId = null;
let searchTimer = null;

const esc = value => String(value ?? '').replace(/[&<>"']/g, ch => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[ch]));

function badge(text, cls = 'pending') {
  if (!text) return '<span class="badge badge-archived">None</span>';
  const map = { approved:'ready', review:'pending', declined:'recon', pending:'pending', closed:'sold', dead:'archived', vehicle_changed:'transport' };
  return `<span class="badge badge-${map[String(text).toLowerCase()] || cls}">${esc(label(text))}</span>`;
}

function label(value) {
  return String(value || '').replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function fmtDate(value) {
  return value ? new Date(value).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }) : '-';
}

function highlight(text) {
  const q = document.getElementById('q').value.trim();
  const raw = esc(text || '-');
  if (!q) return raw;
  const safeQ = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return raw.replace(new RegExp(safeQ, 'ig'), match => `<mark>${match}</mark>`);
}

function params() {
  const qs = new URLSearchParams();
  const q = document.getElementById('q').value.trim();
  if (q) qs.set('q', q);
  qs.set('credit', document.getElementById('creditFilter').value);
  qs.set('deal', document.getElementById('dealFilter').value);
  qs.set('sort', document.getElementById('sort').value);
  qs.set('limit', '75');
  return qs.toString();
}

async function loadClients() {
  const results = document.getElementById('clientResults');
  results.innerHTML = '<div class="client-empty">Searching clients...</div>';
  try {
    const data = await UN.api('GET', `/api/customers?${params()}`);
    clients = data.customers || [];
    selectedId = clients[0]?.id || null;
    renderStats();
    renderResults();
    if (selectedId) loadDetail(selectedId);
    else renderEmptyDetail();
  } catch (err) {
    results.innerHTML = `<div class="client-empty">${esc(err.message || 'Could not load clients.')}</div>`;
    renderEmptyDetail();
  }
}

function renderStats() {
  const withCredit = clients.filter(c => c.credit_count > 0).length;
  const activeDeals = clients.filter(c => c.last_deal_status === 'pending').length;
  const closedDeals = clients.filter(c => c.last_deal_status === 'closed').length;
  document.getElementById('clientStats').innerHTML = `
    <div class="client-stat"><div class="client-stat-icon">#</div><div><span>Results</span><strong>${clients.length}</strong></div></div>
    <div class="client-stat"><div class="client-stat-icon">✓</div><div><span>With Credit Pulls</span><strong>${withCredit}</strong></div></div>
    <div class="client-stat"><div class="client-stat-icon">$</div><div><span>Active Deals</span><strong>${activeDeals}</strong></div></div>
    <div class="client-stat"><div class="client-stat-icon">★</div><div><span>Closed Deals</span><strong>${closedDeals}</strong></div></div>
  `;
}

function renderResults() {
  const el = document.getElementById('clientResults');
  if (!clients.length) {
    el.innerHTML = '<div class="client-empty">No clients match that search yet.</div>';
    return;
  }
  el.innerHTML = clients.map(client => `
    <article class="client-row ${client.id === selectedId ? 'active' : ''}" onclick="selectClient(${client.id})">
      <div class="client-avatar">${esc(initials(client.name))}</div>
      <div>
        <div class="client-name">${highlight(client.name)}</div>
        <div class="client-sub">${highlight(client.phone || 'No phone')} · ${highlight(client.email || 'No email')}</div>
      </div>
      <div class="client-meta">
        <strong>${badge(client.last_credit_status)}</strong>
        <span>${client.credit_count} credit pull${client.credit_count === 1 ? '' : 's'} · ${fmtDate(client.last_credit_at)}</span>
      </div>
      <div class="client-meta">
        <strong>${highlight(client.last_vehicle || 'No vehicle yet')}</strong>
        <span>${client.last_vin ? 'VIN ' + highlight(client.last_vin.slice(-6).toUpperCase()) : 'No VIN'} · ${client.deal_count} deal${client.deal_count === 1 ? '' : 's'}</span>
      </div>
      <div>${badge(client.last_deal_status)}</div>
    </article>
  `).join('');
}

function selectClient(id) {
  selectedId = id;
  renderResults();
  loadDetail(id);
}

async function loadDetail(id) {
  const el = document.getElementById('clientDetail');
  el.innerHTML = '<div class="client-empty">Loading client history...</div>';
  try {
    const data = await UN.api('GET', `/api/customers/${id}`);
    renderDetail(data.customer, data.credit_pulls || [], data.deals || []);
  } catch (err) {
    el.innerHTML = `<div class="client-empty">${esc(err.message || 'Could not load client.')}</div>`;
  }
}

function renderDetail(customer, creditPulls, deals) {
  const el = document.getElementById('clientDetail');
  el.innerHTML = `
    <div class="client-detail-head">
      <div class="detail-identity">
        <div class="detail-avatar">${esc(initials(customer.name))}</div>
        <div>
          <h2>${esc(customer.name)}</h2>
          <p class="client-sub">${esc(customer.phone || 'No phone')} · ${esc(customer.email || 'No email')}</p>
        </div>
      </div>
    </div>
    <div class="client-detail-body">
      <div class="detail-block">
        <h3>Client Info</h3>
        ${detailLine('Address', customer.address)}
        ${detailLine('ID Number', customer.id_number)}
        ${detailLine('Employer', customer.employer)}
        ${detailLine('Monthly Income', customer.monthly_income ? UN.fmt.money(customer.monthly_income) : null)}
        ${detailLine('Created', fmtDate(customer.created_at))}
      </div>
      <div class="detail-block">
        <h3>Credit History</h3>
        ${creditPulls.length ? creditPulls.map(pull => `
          <div class="history-item">
            <strong>${badge(pull.provider_status)} ${pull.score_placeholder ? 'Score ' + esc(pull.score_placeholder) : ''}</strong>
            <span>${fmtDate(pull.pulled_at)} · ${esc(pull.vehicle_interest || 'No vehicle interest')}</span>
            <span>${esc(pull.result_summary || pull.notes || '')}</span>
          </div>
        `).join('') : '<p class="text-muted text-sm">No credit pulls yet.</p>'}
      </div>
      <div class="detail-block">
        <h3>Deal History</h3>
        ${deals.length ? deals.map(deal => `
          <div class="history-item">
            <strong>${badge(deal.status)} ${esc(label(deal.deal_type || 'Deal'))}</strong>
            <span>${fmtDate(deal.created_at)} · ${esc(deal.vehicle || 'No vehicle selected')}</span>
            <span>${deal.vin ? 'VIN ' + esc(deal.vin) : ''}</span>
          </div>
        `).join('') : '<p class="text-muted text-sm">No deals yet.</p>'}
      </div>
      <div class="paper-actions" style="margin:0;">
        <a class="btn btn-primary" href="/credit/new">New Credit Pull</a>
        <a class="btn btn-ghost" href="/paperwork/start">Start Paperwork</a>
      </div>
    </div>
  `;
}

function detailLine(label, value) {
  return `<div class="detail-line"><span>${esc(label)}</span><strong>${esc(value || '-')}</strong></div>`;
}

function initials(name) {
  return String(name || 'Client').split(/\s+/).filter(Boolean).map(part => part[0]).join('').slice(0, 2).toUpperCase() || 'CL';
}

function renderEmptyDetail() {
  document.getElementById('clientDetail').innerHTML = '<div class="client-empty">Select a client to see credit pulls, deals, vehicles, and contact info.</div>';
}

['q','creditFilter','dealFilter','sort'].forEach(id => {
  document.getElementById(id).addEventListener(id === 'q' ? 'input' : 'change', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(loadClients, id === 'q' ? 220 : 0);
  });
});

loadClients();
</script>
</body>
</html>
