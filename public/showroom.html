<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory Showroom - Unit Navigator</title>
  <link rel="stylesheet" href="/css/main.css">
  <script>
    document.documentElement.dataset.publicTheme = localStorage.getItem('un_public_theme') || 'dark';
    document.documentElement.dataset.publicView = localStorage.getItem('un_public_view') || 'cards';
  </script>
  <style>
    :root {
      color-scheme: dark;
      --show-bg-a: #05070c;
      --show-bg-b: #0b111d;
      --show-text: #f8fafc;
      --show-muted: rgba(226,232,240,.76);
      --show-panel: rgba(255,255,255,.055);
      --show-line: rgba(255,255,255,.12);
      --show-tool: rgba(5,7,12,.72);
      --show-field: rgba(255,255,255,.07);
      --show-shadow: rgba(0,0,0,.28);
    }
    :root[data-public-theme="light"] {
      color-scheme: light;
      --show-bg-a: #f8fbff;
      --show-bg-b: #eaf2ff;
      --show-text: #071120;
      --show-muted: rgba(71,85,105,.88);
      --show-panel: rgba(255,255,255,.72);
      --show-line: rgba(15,23,42,.12);
      --show-tool: rgba(255,255,255,.74);
      --show-field: rgba(241,245,249,.9);
      --show-shadow: rgba(15,23,42,.16);
    }
    body {
      background:
        radial-gradient(circle at 12% 8%, rgba(59,130,246,.26), transparent 28%),
        radial-gradient(circle at 88% 6%, rgba(34,211,238,.18), transparent 30%),
        linear-gradient(180deg, var(--show-bg-a), var(--show-bg-b) 54%, var(--show-bg-a));
      color: var(--show-text);
    }
    .showroom-shell { width: min(100% - 44px, 1500px); margin: 0 auto; padding: 16px 0 80px; }
    .showroom-nav {
      display: grid; grid-template-columns: auto minmax(0, 1fr) auto; align-items: center; gap: 18px;
      margin-bottom: 14px; padding: 10px 0 14px; border-bottom: 1px solid var(--show-line);
    }
    .showroom-brand { display: flex; align-items: center; gap: 12px; color: var(--show-text); font-weight: 900; letter-spacing: -.035em; }
    .showroom-brand img { width: 138px; max-height: 52px; object-fit: contain; height: auto; }
    .dealer-contact { min-width: 0; display: flex; justify-content: center; align-items: center; gap: 14px; flex-wrap: wrap; color: var(--show-muted); font-size: .9rem; line-height: 1.35; }
    .dealer-contact strong { color: var(--show-text); font-size: .95rem; }
    .dealer-contact a { color: var(--show-muted); font-weight: 800; }
    .dealer-contact a:hover { color: var(--show-text); }
    .showroom-nav-actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
    .showroom-tools {
      display: grid; grid-template-columns: minmax(240px,1fr) 180px 180px auto auto; gap: 12px;
      margin-bottom: 22px; position: sticky; top: 0; z-index: 20;
      padding: 10px; margin-left: -10px; margin-right: -10px; border-radius: 24px;
      background: var(--show-tool); backdrop-filter: blur(18px);
    }
    .showroom-input, .showroom-select {
      width: 100%; border: 1px solid var(--show-line); border-radius: 16px;
      background: var(--show-field); color: var(--show-text); padding: 13px 15px; font: inherit;
      outline: none;
    }
    .showroom-input::placeholder { color: rgba(100,116,139,.72); }
    .showroom-select option { background: #0b111d; color: #fff; }
    :root[data-public-theme="light"] .showroom-select option { background: #fff; color: #071120; }
    .view-toggle, .theme-toggle {
      display: inline-flex; align-items: center; gap: 4px; padding: 4px;
      border: 1px solid var(--show-line); border-radius: 999px; background: var(--show-panel);
      backdrop-filter: blur(14px);
    }
    .toggle-btn {
      min-height: 38px; border: 0; border-radius: 999px; padding: 0 14px;
      color: var(--show-muted); background: transparent; font-weight: 900; cursor: pointer;
    }
    .toggle-btn.active { background: #2563eb; color: #fff; box-shadow: 0 12px 28px rgba(37,99,235,.28); }
    .showroom-browser {
      display: grid;
      grid-template-columns: 1fr;
      gap: 22px;
      align-items: start;
    }
    .showroom-browser.detail-open {
      grid-template-columns: minmax(340px, .85fr) minmax(560px, 1.35fr);
    }
    .inventory-rail {
      display: grid;
      gap: 14px;
      padding: 2px 2px 14px;
      scrollbar-width: thin;
    }
    .showroom-browser.detail-open .inventory-rail {
      max-height: calc(100vh - 158px);
      overflow: auto;
    }
    .vehicle-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 14px; }
    .showroom-browser.detail-open .vehicle-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
    .vehicle-card {
      position: relative; overflow: hidden; min-height: 330px; border-radius: 18px;
      border: 1px solid rgba(255,255,255,.1);
      background: var(--show-panel);
      box-shadow: 0 18px 46px rgba(0,0,0,.18);
      transform: translateY(14px); opacity: 0;
      animation: cardIn .55s ease-out forwards;
      cursor: pointer;
    }
    .vehicle-card.active {
      border-color: rgba(37,99,235,.88);
      box-shadow: 0 0 0 3px rgba(37,99,235,.22), 0 24px 70px rgba(37,99,235,.2);
    }
    @keyframes cardIn { to { opacity: 1; transform: translateY(0); } }
    .vehicle-photo {
      position: absolute; inset: 0; background: #101827 center / contain no-repeat;
      transition: transform .5s ease, filter .5s ease;
    }
    .vehicle-card:hover .vehicle-photo { transform: scale(1.025); filter: saturate(1.08); }
    .vehicle-photo::after {
      content: ""; position: absolute; inset: 0;
      background:
        linear-gradient(180deg, rgba(2,6,23,.08), rgba(2,6,23,.34) 42%, rgba(2,6,23,.94)),
        radial-gradient(circle at 50% 32%, transparent, rgba(2,6,23,.28) 72%);
    }
    .vehicle-content {
      position: absolute; inset: auto 0 0; padding: 22px; z-index: 2;
      display: grid; gap: 14px;
    }
    .vehicle-title { display: flex; justify-content: space-between; gap: 16px; align-items: start; }
    .vehicle-title h2 {
      color: #fff;
      font-size: 1.28rem;
      line-height: 1;
      letter-spacing: -.045em;
      text-shadow: 0 2px 18px rgba(0,0,0,.68);
    }
    .vehicle-title p {
      color: rgba(255,255,255,.86);
      margin-top: 7px;
      text-shadow: 0 2px 14px rgba(0,0,0,.58);
    }
    .price-pill {
      flex: 0 0 auto; padding: 10px 12px; border-radius: 18px;
      background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.14);
      color: #fff; font-weight: 900; backdrop-filter: blur(12px); text-align: right;
    }
    .price-pill small { display: block; margin-top: 3px; color: rgba(226,232,240,.72); font-size: .76rem; font-weight: 800; }
    .card-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .show-btn {
      display: inline-flex; justify-content: center; align-items: center; min-height: 44px;
      border-radius: 999px; border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.1); color: #fff; font-weight: 900; cursor: pointer;
      backdrop-filter: blur(12px);
    }
    .show-btn.primary { background: #2563eb; border-color: #3b82f6; }
    .vehicle-grid.list-view { grid-template-columns: 1fr; }
    .vehicle-grid.list-view .vehicle-card {
      min-height: 150px; display: grid; grid-template-columns: 170px minmax(0,1fr);
      border-radius: 18px; cursor: pointer;
    }
    .vehicle-grid.list-view .vehicle-photo { position: relative; min-height: 150px; }
    .vehicle-grid.list-view .vehicle-photo::after { background: linear-gradient(90deg, transparent, rgba(2,6,23,.16)); }
    .vehicle-grid.list-view .vehicle-content { position: relative; inset: auto; padding: 24px; align-content: center; }
    :root[data-public-theme="light"] .vehicle-grid.list-view .vehicle-card { border-color: rgba(15,23,42,.1); background: rgba(255,255,255,.82); }
    :root[data-public-theme="light"] .vehicle-grid.list-view .vehicle-title h2 { color: #071120; }
    :root[data-public-theme="light"] .vehicle-grid.list-view .vehicle-title p { color: rgba(71,85,105,.94); }
    :root[data-public-theme="light"] .vehicle-grid.list-view .price-pill {
      color: #071120; background: rgba(15,23,42,.055); border-color: rgba(15,23,42,.1);
    }
    :root[data-public-theme="light"] .vehicle-grid.list-view .price-pill small { color: rgba(71,85,105,.86); }
    :root[data-public-theme="light"] .vehicle-grid.list-view .show-btn:not(.primary) {
      color: #071120; background: rgba(15,23,42,.055); border-color: rgba(15,23,42,.1);
    }
    .vehicle-grid.list-view .photo-count,
    .vehicle-grid.list-view .photo-arrow { display: none; }
    .vehicle-card .photo-arrow { display: none; }
    .mobile-quickbar { display: none; }
    .photo-arrow {
      position: absolute; z-index: 3; top: 45%; transform: translateY(-50%);
      width: 42px; height: 42px; border-radius: 999px; border: 1px solid rgba(255,255,255,.18);
      background: rgba(2,6,23,.42); color: #fff; cursor: pointer; backdrop-filter: blur(10px);
      display: grid; place-items: center; font-size: 1.3rem; transition: transform .16s, background .16s;
    }
    .photo-arrow:hover { transform: translateY(-50%) scale(1.08); background: rgba(37,99,235,.7); }
    .photo-arrow.prev { left: 14px; }
    .photo-arrow.next { right: 14px; }
    .photo-count {
      position: absolute; z-index: 3; top: 16px; right: 16px; padding: 7px 10px; border-radius: 999px;
      background: rgba(2,6,23,.46); border: 1px solid rgba(255,255,255,.14); color: rgba(255,255,255,.88);
      font-size: .78rem; font-weight: 800; backdrop-filter: blur(10px);
    }
    .selected-panel {
      display: none;
      position: sticky;
      top: 98px;
      border: 1px solid var(--show-line);
      border-radius: 28px;
      background: rgba(255,255,255,.065);
      box-shadow: 0 34px 90px var(--show-shadow);
      overflow: hidden;
      min-height: 620px;
    }
    .showroom-browser.detail-open .selected-panel { display: block; }
    :root[data-public-theme="light"] .selected-panel {
      background: rgba(255,255,255,.86);
    }
    .selected-photo {
      position: relative;
      height: clamp(360px, 45vw, 520px);
      background: #050812;
      display: grid;
      place-items: center;
      overflow: hidden;
    }
    .selected-photo img {
      width: 100%;
      height: 100%;
      max-height: 520px;
      object-fit: contain;
      display: block;
    }
    .selected-details {
      padding: 26px;
      display: grid;
      gap: 18px;
    }
    .selected-heading {
      display: flex;
      justify-content: space-between;
      gap: 22px;
      align-items: start;
    }
    .selected-heading h1 {
      font-size: clamp(2rem, 4vw, 4rem);
      line-height: .94;
      letter-spacing: -.06em;
      color: var(--show-text);
    }
    .selected-heading p { margin-top: 8px; color: var(--show-muted); font-weight: 800; }
    .selected-price {
      flex: 0 0 auto;
      text-align: right;
      padding: 12px 14px;
      border-radius: 18px;
      color: var(--show-text);
      border: 1px solid var(--show-line);
      background: var(--show-field);
      font-weight: 950;
      font-size: 1.25rem;
    }
    .selected-price small {
      display: block;
      margin-top: 4px;
      color: var(--show-muted);
      font-size: .82rem;
      font-weight: 850;
    }
    .selected-specs {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    .selected-spec {
      border: 1px solid var(--show-line);
      border-radius: 16px;
      padding: 12px;
      background: var(--show-field);
      min-width: 0;
    }
    .selected-spec span {
      display: block;
      color: var(--show-muted);
      font-size: .72rem;
      font-weight: 950;
      letter-spacing: .11em;
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    .selected-spec strong {
      color: var(--show-text);
      font-size: 1.02rem;
      overflow-wrap: anywhere;
    }
    .selected-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .selected-actions .show-btn {
      min-height: 52px;
      color: var(--show-text);
      border-color: var(--show-line);
      background: var(--show-field);
    }
    .selected-actions .show-btn.primary { color: #fff; background: #2563eb; border-color: #3b82f6; }
    .selected-description {
      border: 1px solid var(--show-line);
      border-radius: 18px;
      padding: 16px;
      background: var(--show-field);
      color: var(--show-muted);
      line-height: 1.55;
      white-space: pre-wrap;
    }
    .selected-description strong {
      display: block;
      color: var(--show-text);
      margin-bottom: 6px;
    }
    .selected-close {
      position: absolute;
      z-index: 4;
      top: 16px;
      left: 16px;
      width: 42px;
      height: 42px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(2,6,23,.56);
      color: #fff;
      font-size: 1.35rem;
      cursor: pointer;
      backdrop-filter: blur(10px);
    }
    .selected-empty {
      min-height: 620px;
      display: grid;
      place-items: center;
      padding: 34px;
      text-align: center;
      color: var(--show-muted);
    }
    .empty-showroom {
      grid-column: 1 / -1; text-align: center; border: 1px dashed rgba(255,255,255,.16);
      border-radius: 28px; padding: 70px 24px; color: rgba(226,232,240,.68);
      background: rgba(255,255,255,.04);
    }
    @media(max-width: 1180px) {
      .showroom-browser { grid-template-columns: 1fr; }
      .showroom-browser.detail-open { grid-template-columns: 1fr; }
      .selected-panel { position: relative; top: auto; order: -1; min-height: auto; }
      .inventory-rail { max-height: none; overflow: visible; }
      .vehicle-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .showroom-nav { grid-template-columns: 1fr auto; align-items: start; }
      .dealer-contact { grid-column: 1 / -1; justify-content: flex-start; order: 3; }
    }
    @media(max-width: 760px) {
      body {
        background:
          radial-gradient(circle at 20% 0%, rgba(59,130,246,.24), transparent 34%),
          linear-gradient(180deg, #05070c, #0b111d 58%, #06080d);
      }
      .showroom-shell { width: min(100% - 24px, 560px); padding: 10px 0 92px; }
      .showroom-brand img { width: 126px; max-height: 46px; }
      .showroom-nav { gap: 10px; margin-bottom: 10px; grid-template-columns: 1fr auto; align-items: center; }
      .dealer-contact { justify-content: flex-start; gap: 8px 12px; font-size: .82rem; }
      .dealer-contact strong { width: 100%; font-size: .9rem; }
      .showroom-nav-actions { width: auto; display: flex; }
      .showroom-nav-actions .btn { justify-content: center; padding: 10px 12px; }
      .showroom-tools { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .showroom-tools .showroom-input { grid-column: 1 / -1; }
      .vehicle-grid { grid-template-columns: 1fr; }
      .showroom-tools {
        top: 0; gap: 8px; padding: 10px 0 12px; margin: 0 0 16px;
        border-radius: 0 0 24px 24px;
      }
      .showroom-input, .showroom-select { border-radius: 14px; padding: 12px 13px; font-size: .95rem; }
      .vehicle-grid { gap: 16px; }
      .vehicle-card { min-height: 430px; border-radius: 22px; }
      .vehicle-content { padding: 16px; gap: 12px; }
      .vehicle-title { display: grid; gap: 10px; }
      .vehicle-title h2 { font-size: 1.55rem; }
      .vehicle-title p { font-size: .92rem; margin-top: 5px; }
      .price-pill { justify-self: start; padding: 8px 11px; }
      .card-actions { grid-template-columns: 1fr; }
      .show-btn { min-height: 48px; }
      .photo-arrow {
        top: 38%; width: 48px; height: 48px; font-size: 1.55rem;
        background: rgba(2,6,23,.58);
      }
      .photo-arrow.prev { left: 10px; }
      .photo-arrow.next { right: 10px; }
      .photo-count { top: 12px; right: 12px; }
      .mobile-quickbar {
        position: fixed; z-index: 60; left: 12px; right: 12px; bottom: 12px;
        display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
        padding: 10px; border: 1px solid rgba(255,255,255,.12); border-radius: 22px;
        background: rgba(2,6,23,.74); backdrop-filter: blur(18px);
        box-shadow: 0 20px 60px rgba(0,0,0,.35);
      }
      .mobile-quickbar a {
        min-height: 46px; display: grid; place-items: center; border-radius: 999px;
        color: #fff; font-weight: 900; border: 1px solid rgba(255,255,255,.13);
        background: rgba(255,255,255,.1);
      }
      .mobile-quickbar a:first-child { background: #2563eb; border-color: #3b82f6; }
      .vehicle-grid.list-view .vehicle-card { grid-template-columns: 1fr; min-height: 430px; }
      .vehicle-grid.list-view .vehicle-photo { min-height: 240px; }
      .selected-photo { height: 300px; }
      .selected-details { padding: 18px; }
      .selected-heading { display: grid; gap: 12px; }
      .selected-price { justify-self: start; text-align: left; }
      .selected-specs { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media(max-width: 390px) {
      .vehicle-card { min-height: 520px; }
    }
  </style>
</head>
<body>
<main class="showroom-shell">
  <nav class="showroom-nav">
    <a class="showroom-brand" href="/">
      <img id="brandLogo" src="/assets/unit-navigator-logo-on-dark.png" alt="Unit Navigator">
    </a>
    <div class="dealer-contact" id="dealerContact">
      <strong id="dealerName">Dealer Inventory</strong>
      <span id="dealerAddress"></span>
      <a id="dealerPhone" href="#" hidden></a>
      <a id="dealerEmail" href="#" hidden></a>
    </div>
    <div class="showroom-nav-actions">
      <a class="btn btn-primary" href="/credit/new">Credit App</a>
    </div>
  </nav>

  <section class="showroom-tools">
    <input class="showroom-input" id="search" placeholder="Search year, make, model, trim..." oninput="renderInventory()">
    <select class="showroom-select" id="sort" onchange="renderInventory()">
      <option value="featured">Featured</option>
      <option value="payment_low">Payment: Low to High</option>
      <option value="payment_high">Payment: High to Low</option>
      <option value="miles_low">Miles: Low to High</option>
      <option value="year_new">Year: Newest</option>
    </select>
    <select class="showroom-select" id="apr" onchange="renderInventory()">
      <option value="9.99">Est. APR 9.99%</option>
      <option value="7.99">Est. APR 7.99%</option>
      <option value="12.99">Est. APR 12.99%</option>
      <option value="18.99">Est. APR 18.99%</option>
    </select>
    <div class="view-toggle" aria-label="Inventory view">
      <button class="toggle-btn" id="cardsBtn" type="button" onclick="setView('cards')">Cards</button>
      <button class="toggle-btn" id="listBtn" type="button" onclick="setView('list')">List</button>
    </div>
    <div class="theme-toggle" aria-label="Theme">
      <button class="toggle-btn" id="lightBtn" type="button" onclick="setTheme('light')">Light</button>
      <button class="toggle-btn" id="darkBtn" type="button" onclick="setTheme('dark')">Dark</button>
    </div>
  </section>

  <section class="showroom-browser" id="showroomBrowser">
    <div class="inventory-rail">
      <section class="vehicle-grid" id="vehicleGrid"></section>
    </div>
    <aside class="selected-panel" id="selectedPanel" aria-live="polite"></aside>
  </section>
</main>

<div class="mobile-quickbar">
  <a href="/credit/new">Apply</a>
  <a href="#vehicleGrid">Inventory</a>
</div>

<script>
let units = [];
const photoIndex = new Map();
const fallbackPhoto = '/assets/home-hero-car.png';
let viewMode = localStorage.getItem('un_public_view') || 'cards';
const dealerParam = new URLSearchParams(location.search).get('dealer') || '';
let dealerLogoUrl = '';
let aprOptions = [9.99, 7.99, 12.99, 18.99];
let selectedUnitId = null;
let dealerPhoneValue = '';

function publicUrl(path) {
  if (!dealerParam) return path;
  const join = path.includes('?') ? '&' : '?';
  return `${path}${join}dealer=${encodeURIComponent(dealerParam)}`;
}

function money(n) {
  if (!n) return 'Call for price';
  return '$' + Number(n).toLocaleString('en-US', { maximumFractionDigits: 0 });
}

function miles(n) {
  if (n == null || n === '') return '-';
  return Number(n).toLocaleString('en-US');
}

function monthly(price) {
  if (!price) return null;
  const principal = Number(price) * 0.8;
  const apr = Number(document.getElementById('apr').value || aprOptions[0] || 9.99) / 100;
  const r = apr / 12;
  const months = 60;
  return r ? principal * r / (1 - Math.pow(1 + r, -months)) : principal / months;
}

function vehicleSubtitle(unit) {
  const bits = [];
  if (unit.trim) bits.push(unit.trim);
  if (unit.mileage != null && unit.mileage !== '') bits.push(`${miles(unit.mileage)} miles`);
  return bits.join(' · ') || unit.body_style || 'Available now';
}

function setTheme(theme) {
  document.documentElement.dataset.publicTheme = theme;
  localStorage.setItem('un_public_theme', theme);
  document.getElementById('lightBtn')?.classList.toggle('active', theme === 'light');
  document.getElementById('darkBtn')?.classList.toggle('active', theme === 'dark');
  const logo = document.getElementById('brandLogo');
  if (logo) logo.src = dealerLogoUrl || (theme === 'light' ? '/assets/unit-navigator-logo-transparent.png' : '/assets/unit-navigator-logo-on-dark.png');
}

function renderAprOptions(options) {
  const select = document.getElementById('apr');
  const clean = (options || []).map(Number).filter(value => Number.isFinite(value) && value >= 0 && value <= 40);
  aprOptions = clean.length ? clean : [9.99, 7.99, 12.99, 18.99];
  select.innerHTML = aprOptions.map(value => {
    const label = value.toFixed(2).replace(/\.00$/, '');
    return `<option value="${label}">Est. APR ${label}%</option>`;
  }).join('');
}

function setView(mode) {
  viewMode = mode;
  document.documentElement.dataset.publicView = mode;
  localStorage.setItem('un_public_view', mode);
  document.getElementById('cardsBtn')?.classList.toggle('active', mode === 'cards');
  document.getElementById('listBtn')?.classList.toggle('active', mode === 'list');
  renderInventory();
}

function contactLink(id, value, hrefPrefix) {
  const el = document.getElementById(id);
  if (!el) return;
  if (!value) {
    el.hidden = true;
    el.removeAttribute('href');
    el.textContent = '';
    return;
  }
  el.hidden = false;
  el.href = `${hrefPrefix}${value}`;
  el.textContent = value;
}

async function loadDealer() {
  try {
    const res = await fetch(publicUrl('/api/public/dealer'));
    const data = await res.json();
    const dealer = data.dealer || {};
    document.getElementById('dealerName').textContent = dealer.display_name || dealer.name || 'Dealer Inventory';
    document.getElementById('dealerAddress').textContent = dealer.address || '';
    dealerPhoneValue = dealer.phone || '';
    contactLink('dealerPhone', dealer.phone, 'tel:');
    contactLink('dealerEmail', dealer.email, 'mailto:');
    renderAprOptions(dealer.apr_options);
    if (units.length) renderInventory();
    dealerLogoUrl = dealer.logo_url || '';
    if (dealerLogoUrl) document.getElementById('brandLogo').src = dealerLogoUrl;
  } catch {
    document.getElementById('dealerName').textContent = 'Dealer Inventory';
  }
}

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[ch]));
}

async function loadInventory() {
  const res = await fetch(publicUrl('/api/public/inventory'));
  const data = await res.json();
  units = data.units || [];
  units.forEach(unit => photoIndex.set(unit.id, 0));
  selectedUnitId = null;
  renderInventory();
}

function filteredUnits() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  const sort = document.getElementById('sort').value;
  let list = units.filter(unit => {
    const haystack = [unit.year, unit.make, unit.model, unit.trim, unit.color, unit.body_style].join(' ').toLowerCase();
    return !q || haystack.includes(q);
  });
  list = [...list].sort((a, b) => {
    if (sort === 'payment_low') return (monthly(a.price) || 999999) - (monthly(b.price) || 999999);
    if (sort === 'payment_high') return (monthly(b.price) || 0) - (monthly(a.price) || 0);
    if (sort === 'miles_low') return (a.mileage || 9999999) - (b.mileage || 9999999);
    if (sort === 'year_new') return (b.year || 0) - (a.year || 0);
    return (b.asking_price || 0) - (a.asking_price || 0);
  });
  return list;
}

function renderInventory() {
  const grid = document.getElementById('vehicleGrid');
  const panel = document.getElementById('selectedPanel');
  const browser = document.getElementById('showroomBrowser');
  const list = filteredUnits();
  grid.classList.toggle('list-view', viewMode === 'list');
  if (!list.length) {
    if (browser) browser.classList.remove('detail-open');
    grid.innerHTML = `
      <div class="empty-showroom">
        <h2>No public inventory yet.</h2>
        <p>Move units to Ready in Unit Navigator and they will appear here.</p>
      </div>`;
    if (panel) {
      panel.innerHTML = `
        <div class="selected-empty">
          <div>
            <h2>No unit selected.</h2>
            <p>Inventory will appear here as soon as it is ready for the public showroom.</p>
          </div>
        </div>`;
    }
    return;
  }
  if (selectedUnitId && !list.some(unit => unit.id === selectedUnitId)) selectedUnitId = null;
  if (browser) browser.classList.toggle('detail-open', Boolean(selectedUnitId));
  grid.innerHTML = list.map((unit, i) => vehicleCard(unit, i)).join('');
  renderSelectedUnit();
}

function vehicleCard(unit, i) {
  const photos = unit.photos?.length ? unit.photos : [fallbackPhoto];
  const index = photoIndex.get(unit.id) || 0;
  const photo = photos[index] || photos[0];
  const pay = monthly(unit.price);
  const title = [unit.year, unit.make, unit.model].filter(Boolean).join(' ');
  const active = unit.id === selectedUnitId ? ' active' : '';
  return `
    <article class="vehicle-card${active}" onclick="selectVehicle(${unit.id})" style="animation-delay:${Math.min(i * 70, 420)}ms">
      <div class="vehicle-photo" style="background-image:url('${escapeHtml(photo)}')"></div>
      <div class="photo-count">${index + 1} / ${photos.length}</div>
      <div class="vehicle-content">
        <div class="vehicle-title">
          <div>
            <h2>${escapeHtml(title || 'Available Unit')}</h2>
            <p>${escapeHtml(vehicleSubtitle(unit))}</p>
          </div>
          <div class="price-pill">${money(unit.price)}<small>${pay ? money(pay) + '/mo est.' : 'Payment estimate available'}</small></div>
        </div>
        <div class="card-actions">
          <a class="show-btn primary" href="${publicUrl('/credit/new')}" onclick="event.stopPropagation()">Apply</a>
          <button class="show-btn" type="button" onclick="event.stopPropagation(); selectVehicle(${unit.id})">View</button>
        </div>
      </div>
    </article>
  `;
}

function selectVehicle(id) {
  selectedUnitId = selectedUnitId === id ? null : id;
  renderInventory();
  if (selectedUnitId) document.getElementById('selectedPanel')?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function closeSelectedVehicle(event) {
  event?.stopPropagation();
  selectedUnitId = null;
  renderInventory();
}

function renderSelectedUnit() {
  const panel = document.getElementById('selectedPanel');
  if (!panel) return;
  const unit = units.find(u => u.id === selectedUnitId);
  if (!unit) {
    panel.innerHTML = `
      <div class="selected-empty">
        <div>
          <h2>Select a vehicle.</h2>
          <p>Pick anything from the inventory list to see photos, pricing, and details.</p>
        </div>
      </div>`;
    return;
  }
  const photos = unit.photos?.length ? unit.photos : [fallbackPhoto];
  const index = photoIndex.get(unit.id) || 0;
  const photo = photos[index] || photos[0];
  const pay = monthly(unit.price);
  const title = [unit.year, unit.make, unit.model].filter(Boolean).join(' ') || 'Available Unit';
  const description = String(unit.notes || '').trim();
  panel.innerHTML = `
    <div class="selected-photo">
      <button class="selected-close" type="button" onclick="closeSelectedVehicle(event)" aria-label="Close vehicle details">×</button>
      <img src="${escapeHtml(photo)}" alt="${escapeHtml(title)}">
      <div class="photo-count">${index + 1} / ${photos.length}</div>
      ${photos.length > 1 ? `
        <button class="photo-arrow prev" onclick="movePhoto(event, ${unit.id}, -1)" aria-label="Previous photo">‹</button>
        <button class="photo-arrow next" onclick="movePhoto(event, ${unit.id}, 1)" aria-label="Next photo">›</button>
      ` : ''}
    </div>
    <div class="selected-details">
      <div class="selected-heading">
        <div>
          <h1>${escapeHtml(title)}</h1>
          <p>${escapeHtml(vehicleSubtitle(unit))}</p>
        </div>
        <div class="selected-price">
          ${money(unit.price)}
          <small>${pay ? money(pay) + '/mo est.' : 'Payment estimate available'}</small>
        </div>
      </div>
      <div class="selected-specs">
        ${selectedSpec('Trim', unit.trim || '-')}
        ${selectedSpec('Miles', unit.mileage != null && unit.mileage !== '' ? miles(unit.mileage) : '-')}
        ${selectedSpec('Color', unit.color || '-')}
        ${selectedSpec('Body', unit.body_style || '-')}
        ${selectedSpec('VIN', unit.vin || '-')}
        ${selectedSpec('Stock', unit.stock_number || unit.stock || '-')}
      </div>
      <div class="selected-description">
        <strong>Description</strong>
        ${description ? escapeHtml(description) : 'No additional description has been added yet.'}
      </div>
      <div class="selected-actions">
        <a class="show-btn primary" href="${publicUrl('/credit/new')}">Apply</a>
        <a class="show-btn" href="tel:${escapeHtml(dealerPhoneValue)}">Call Dealer</a>
      </div>
    </div>
  `;
}

function selectedSpec(label, value) {
  return `
    <div class="selected-spec">
      <span>${escapeHtml(label)}</span>
      <strong>${escapeHtml(value)}</strong>
    </div>`;
}

function movePhoto(event, id, dir) {
  event.stopPropagation();
  const unit = units.find(u => u.id === id);
  if (!unit) return;
  const photos = unit.photos?.length ? unit.photos : [fallbackPhoto];
  const current = photoIndex.get(id) || 0;
  photoIndex.set(id, (current + dir + photos.length) % photos.length);
  if (selectedUnitId === id) {
    renderSelectedUnit();
    return;
  }
  renderInventory();
}

setTheme(localStorage.getItem('un_public_theme') || 'dark');
setView(viewMode);
loadDealer();
loadInventory().catch(() => {
  document.getElementById('vehicleGrid').innerHTML = `
    <div class="empty-showroom">
      <h2>Inventory is unavailable right now.</h2>
      <p>Please check back soon.</p>
    </div>`;
  document.getElementById('selectedPanel').innerHTML = `
    <div class="selected-empty">
      <div>
        <h2>Inventory is unavailable.</h2>
        <p>Please check back soon.</p>
      </div>
    </div>`;
});
</script>
</body>
</html>
